<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Smart Retail Frontend</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Smart Retail Dashboard</h1>
      <nav class="main-nav" aria-label="Main navigation">
        <button type="button" class="nav-btn active" data-view="home">Home</button>
        <button type="button" class="nav-btn" data-view="products">Products</button>
        <button type="button" class="nav-btn" data-view="stores">Stores</button>
        <button type="button" class="nav-btn" data-view="employees">Employees</button>
      </nav>
    </header>

    <main class="app-main">
      <section id="home-view" class="view active" aria-label="Home view">
        <h2>Home</h2>
        <p>Use the navigation to manage products and inspect store and employee data.</p>
      </section>

      <section id="products-view" class="view" aria-label="Products view">
        <h2>Products</h2>

        <div class="panel">
          <h3>Create Product</h3>
          <form id="create-product-form" class="form-grid">
            <label>Name <input name="name" required /></label>
            <label>Image <input name="image" required /></label>
            <label>Size <input name="size" required /></label>
            <label>Price <input name="price" type="number" step="0.01" required /></label>
            <label>Color <input name="color" required placeholder="#RRGGBB" /></label>
            <button type="submit">Create</button>
          </form>
        </div>

        <div class="panel">
          <h3>Update Product (PATCH)</h3>
          <form id="update-product-form" class="form-grid">
            <label>Product ID <input name="id" required /></label>
            <label>Name <input name="name" /></label>
            <label>Image <input name="image" /></label>
            <label>Size <input name="size" /></label>
            <label>Price <input name="price" type="number" step="0.01" /></label>
            <label>Color <input name="color" placeholder="#RRGGBB" /></label>
            <button type="submit">Update</button>
          </form>
        </div>

        <div class="panel">
          <h3>Delete Product</h3>
          <form id="delete-product-form" class="inline-form">
            <label>Product ID <input name="id" required /></label>
            <button type="submit" class="danger">Delete</button>
          </form>
        </div>

        <div class="panel">
          <div class="panel-row">
            <h3>Product List</h3>
            <button type="button" id="refresh-products-btn">Refresh</button>
          </div>
          <ul id="products-list" class="entity-list"></ul>
        </div>
      </section>

      <section id="stores-view" class="view" aria-label="Stores view">
        <div class="panel-row">
          <h2>Stores</h2>
          <button type="button" id="refresh-stores-btn">Refresh</button>
        </div>
        <ul id="stores-list" class="entity-list"></ul>
      </section>

      <section id="employees-view" class="view" aria-label="Employees view">
        <div class="panel-row">
          <h2>Employees</h2>
          <button type="button" id="refresh-employees-btn">Refresh</button>
        </div>
        <p id="employees-note" class="muted">Employee endpoint may be unavailable in current backend build.</p>
        <ul id="employees-list" class="entity-list"></ul>
      </section>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
